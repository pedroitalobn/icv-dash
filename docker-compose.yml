# Deploy no Dokploy (Compose). Defina as variáveis no painel de Environment do Dokploy.
#
# IMPORTANTE (2 pontos que quebram o deploy se errados):
#  1) DATABASE_URL DEVE terminar com  ?schema=icv_dash  para isolar o app das
#     tabelas que já existem no schema `public` do banco `cruzdavida`.
#  2) Na ASAAS_API_KEY, escape o `$` inicial como `$$` (senão o Compose zera o valor).

x-env: &app-env
  DATABASE_URL: ${DATABASE_URL}
  ASAAS_API_URL: ${ASAAS_API_URL}
  ASAAS_API_KEY: ${ASAAS_API_KEY}
  ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
  CRON_SECRET: ${CRON_SECRET}
  SYNC_LOOKBACK_DAYS: ${SYNC_LOOKBACK_DAYS:-35}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  AUTH_SECRET: ${AUTH_SECRET}

services:
  # Inicialização: cria o schema `icv_dash` + tabelas (db push, idempotente) e o admin.
  # Roda uma vez e encerra; app/cron só sobem após este terminar com sucesso.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: icv-dash:latest
    restart: "no"
    environment: *app-env
    command: >
      sh -c "npx prisma db push --skip-generate --accept-data-loss &&
             npx tsx prisma/seed.ts"
    networks:
      - dokploy-network

  # Aplicação web (dashboard + APIs).
  app:
    image: icv-dash:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-env
    command: npm start
    expose:
      - "3000"
    networks:
      - dokploy-network

  # Cron interno: sincroniza com o Asaas a cada 15 minutos (alimenta o banco/dash).
  cron:
    image: icv-dash:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-env
    command: >
      sh -c "while true; do
               echo '[cron] sincronizando...';
               npx tsx scripts/sync.ts || echo '[cron] falhou, tenta no próximo ciclo';
               sleep 900;
             done"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
