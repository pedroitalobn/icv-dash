# Deploy no Dokploy (Compose). Defina as variáveis no painel de Environment do Dokploy.
# IMPORTANTE: na ASAAS_API_KEY, escape o `$` inicial como `$$` (veja README/notas).

x-env: &app-env
  DATABASE_URL: ${DATABASE_URL}
  ASAAS_API_URL: ${ASAAS_API_URL}
  ASAAS_API_KEY: ${ASAAS_API_KEY}
  ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
  CRON_SECRET: ${CRON_SECRET}
  SYNC_LOOKBACK_DAYS: ${SYNC_LOOKBACK_DAYS:-35}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  AUTH_SECRET: ${AUTH_SECRET}

services:
  # Aplicação web (dashboard + APIs). Roda a migration + seed e sobe o Next.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: icv-dash:latest
    restart: unless-stopped
    environment: *app-env
    command: >
      sh -c "npx prisma migrate deploy &&
             npx tsx prisma/seed.ts &&
             npm start"
    expose:
      - "3000"
    networks:
      - dokploy-network

  # Cron interno: sincroniza com o Asaas a cada 15 minutos (alimenta o banco/dash).
  cron:
    image: icv-dash:latest
    restart: unless-stopped
    depends_on:
      - app
    environment: *app-env
    command: >
      sh -c "while true; do
               echo '[cron] sincronizando...';
               npx tsx scripts/sync.ts || echo '[cron] falhou, tenta no próximo ciclo';
               sleep 900;
             done"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
