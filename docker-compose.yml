# Deploy no Dokploy (Compose) — banco PostgreSQL DEDICADO (isolado de tudo).
#
# Defina no Environment do Dokploy:
#   POSTGRES_PASSWORD   (senha do banco do app)
#   ASAAS_API_KEY       (com o $ inicial escapado como $$ → $$aact_prod_...)
#   AUTH_SECRET, CRON_SECRET, ASAAS_WEBHOOK_TOKEN
#   ADMIN_EMAIL, ADMIN_PASSWORD
#   (opcionais) ASAAS_API_URL, SYNC_ENABLED=true para ligar o cron do Asaas
#
# A carga inicial vem da IMPORTAÇÃO das planilhas em data/imports (serviço migrate).
# O cron do Asaas fica DESLIGADO por padrão (SYNC_ENABLED != true).

x-env: &app-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-icv}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-icvdash}?schema=public
  ASAAS_API_URL: ${ASAAS_API_URL:-https://api.asaas.com/v3}
  ASAAS_API_KEY: ${ASAAS_API_KEY}
  ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
  ASAAS_PROJECT: ${ASAAS_PROJECT:-Cruz da Vida}
  CRON_SECRET: ${CRON_SECRET}
  SYNC_LOOKBACK_DAYS: ${SYNC_LOOKBACK_DAYS:-35}
  SYNC_ENABLED: ${SYNC_ENABLED:-false}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  AUTH_SECRET: ${AUTH_SECRET}

services:
  # Banco de dados dedicado do app.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-icv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-icvdash}
    volumes:
      - icv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-icv} -d ${POSTGRES_DB:-icvdash}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - dokploy-network

  # Inicialização: cria as tabelas (db push), seed do admin e IMPORTA as planilhas.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: icv-dash:latest
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment: *app-env
    command: >
      sh -c "npx prisma db push --skip-generate --accept-data-loss &&
             npx tsx prisma/seed.ts &&
             npx tsx scripts/import.ts"
    networks:
      - dokploy-network

  # Aplicação web (dashboard + APIs).
  app:
    image: icv-dash:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-env
    command: npm start
    expose:
      - "3000"
    networks:
      - dokploy-network

  # Cron do Asaas (incremental). Só roda se SYNC_ENABLED=true.
  cron:
    image: icv-dash:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-env
    command: >
      sh -c "while true; do
               if [ \"$$SYNC_ENABLED\" = \"true\" ]; then
                 echo '[cron] sincronizando Asaas...';
                 npx tsx scripts/sync.ts || echo '[cron] falhou, tenta no próximo ciclo';
               else
                 echo '[cron] desativado (SYNC_ENABLED!=true)';
               fi;
               sleep 900;
             done"
    networks:
      - dokploy-network

volumes:
  icv_pgdata:

networks:
  dokploy-network:
    external: true
